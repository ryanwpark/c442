
services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: budget_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: budget_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - budget_net
  # Flask App
  web:
    build: .
    container_name: budget_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_DATABASE=budget_db
    depends_on:
      - db
    networks:
      - budget_net
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - budget_net


  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - budget_net
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

networks:
  budget_net:
    driver: bridge

volumes:
  mysql_data:
  grafana_data: